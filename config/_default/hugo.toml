# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://jpanther.github.io/congo/docs/getting-started/

# When using Hugo Modules this config value should be removed.
#theme = "congo"

baseURL = "https://alainwolf.ch/"
languageCode = "en"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true
pagination.pagerSize = 10
summaryLength = 0

[outputs]
  home = ["HTML", "RSS", "JSON"]

[privacy]
  [privacy.googleAnalytics]
    disable = true

  [privacy.disqus]
    disable = true

  [privacy.instagram]
    disable = true

  [privacy.x]
    disable = true

  [privacy.vimeo]
    disable = true

  [privacy.youtube]
    disable = true
